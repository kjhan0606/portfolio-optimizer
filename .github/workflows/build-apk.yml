name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg zlib1g-dev autoconf automake libtool libtool-bin libltdl-dev gettext autopoint pkg-config zip unzip openjdk-17-jdk cmake lld
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36
      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-
      - name: Build APK
        run: yes | buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-optimizer-apk
          path: bin/*.apk
